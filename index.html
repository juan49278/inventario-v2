<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario V2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
  <!-- <link rel="stylesheet" href="css/styles.css"> -->
  <link rel="shortcut icon" href="frigo.ico" type="image/x-icon">
  <script src="//ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script src="//cdn.rawgit.com/rainabba/jquery-table2excel/1.1.0/dist/jquery.table2excel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
    crossorigin="anonymous"></script>
</head>

<body>
  <small>v2</small>
  <div class="container">
    <div class="row d-flex justify-content-between">
      <div class="col">
        <h1 class="text-center mt-4">Inventario</h1>
        <div class="col-md-5 col-8">
          <input type="text" name="search" id="search" class="form-control col-3 mt-3">
          <button class="btn btn-info mt-3 disabled" id="btnSearch" data-bs-toggle="modal" data-bs-target="#exampleModal">Buscar</button>
        </div>
        <div id="listGroup">
        </div>
        <div>
          <ol class="list-group list-group-numbered col-md-7 mt-3" id="findResults">

          </ol>
        </div>
        <table class="table form-control-md" id="table">
          <thead>
            <tr class="form-control-md">
              <th scope="col-span-2" class="col-1">#</th>
              <th scope="col-span-2">Producto</th>
              <th scope="col-span-2">Cantidad</th>
              <th scope="col-span-2">Precio</th>
              <th scope="col-span-2">Total $</th>
            </tr>
          </thead>
          <tbody class="form-control-md" id="productos">
          </tbody>
          <tfoot>
            <tr>
              <td>Total balance:</td>
              <td>$ <span id="result"></span></td>
              <td>Fecha: <span id="mesVal"></span></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>
</body>
<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="search.js" defer></script>
</html>
